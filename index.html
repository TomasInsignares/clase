<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clase.fun</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--surface:#141414;--surface2:#1e1e1e;--surface3:#262626;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.22);
  --text:#ededed;--text2:#a1a1a1;--muted:#525252;
  --accent:#ff6b35;--accent2:#ff8c5a;--accent-bg:rgba(255,107,53,0.08);
  --danger:#ef4444;--danger-bg:rgba(239,68,68,0.1);--success:#22c55e;--success-bg:rgba(34,197,94,0.1);
  --info:#3b82f6;--warn:#f59e0b;
  --sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono','SF Mono',monospace;
  --radius:6px;--radius-lg:10px;--radius-xl:16px;
  --shadow-sm:0 1px 6px rgba(0,0,0,0.5);--shadow-md:0 4px 20px rgba(0,0,0,0.6);--shadow-lg:0 8px 40px rgba(0,0,0,0.7);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;font-size:15px}

.wrap{max-width:920px;margin:0 auto;padding:3rem 1.5rem}

/* HOME */
.home-header{margin-bottom:3.5rem}
.home-header .eyebrow{font-size:0.68rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem;display:flex;align-items:center;gap:8px}
.home-header .eyebrow::before{content:'';display:inline-block;width:20px;height:1px;background:var(--accent)}
.home-header h1{font-size:clamp(2.6rem,7vw,4.2rem);font-weight:700;letter-spacing:-2.5px;line-height:1;margin-bottom:0.8rem}
.home-header h1 .dot{color:var(--accent)}
.home-header p{font-size:0.83rem;color:var(--muted)}

/* GRID */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden}
.game-card{background:var(--surface);padding:1.4rem 1.2rem 1.2rem;cursor:pointer;position:relative;overflow:hidden;transition:background 0.15s;border:none}
.game-card:hover{background:var(--surface2)}
.game-card:active{background:var(--surface3)}
.game-card .gc-num{font-family:var(--mono);font-size:0.62rem;color:var(--muted);margin-bottom:1rem;display:block}
.game-card .gc-abbr{font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent);margin-bottom:0.55rem;display:block;font-family:var(--mono)}
.game-card .gc-name{font-size:0.9rem;font-weight:600;margin-bottom:0.28rem;color:var(--text);letter-spacing:-0.3px}
.game-card .gc-desc{font-size:0.71rem;color:var(--muted);line-height:1.45}
.game-card .gc-tag{position:absolute;top:12px;right:12px;font-size:0.56rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;background:var(--accent-bg);color:var(--accent);border:1px solid rgba(255,107,53,0.18);border-radius:99px}
.game-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform 0.22s ease}
.game-card:hover::after{transform:scaleX(1)}

/* SHELL */
#game-shell{display:none}
#game-shell.active{display:block}
.shell-header{display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.back-btn{font-family:var(--sans);font-size:0.78rem;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px;transition:color 0.12s;flex-shrink:0}
.back-btn:hover{color:var(--accent)}
.shell-title{font-size:1.1rem;font-weight:600;letter-spacing:-0.4px;flex:1}
.shell-score-bar{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.score-chip{font-size:0.7rem;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;color:var(--muted);white-space:nowrap;font-family:var(--mono)}
.score-chip b{color:var(--text);font-weight:500}
#game-root{min-height:300px}

/* COMPONENTS */
.btn{font-family:var(--sans);font-size:0.83rem;font-weight:600;padding:8px 18px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;transition:all 0.12s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface3);border-color:var(--border3)}
.btn:active{transform:scale(0.97)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{background:var(--text2)}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 12px rgba(255,107,53,0.25)}
.btn.accent:hover{background:var(--accent2);box-shadow:0 4px 20px rgba(255,107,53,0.4)}
.btn.danger{background:var(--danger-bg);color:var(--danger);border-color:rgba(239,68,68,0.2)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{font-size:0.72rem;padding:5px 11px}
.btn.lg{font-size:0.95rem;padding:12px 28px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.4rem}
.card+.card{margin-top:10px}
.card.hi{border-color:rgba(255,107,53,0.2);box-shadow:0 0 20px rgba(255,107,53,0.06)}

.num-big{font-size:clamp(2.5rem,8vw,4rem);line-height:1;font-weight:700;letter-spacing:-2px;font-family:var(--mono)}
.label-sm{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:4px}

input[type=text],input[type=number],textarea,select{font-family:var(--sans);font-size:0.88rem;width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;transition:border-color 0.12s,box-shadow 0.12s}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,0.08)}

.progress-wrap{background:var(--surface3);border-radius:99px;height:4px;overflow:hidden}
.progress{height:100%;background:var(--accent);border-radius:99px;transition:width 0.15s}

.tag{display:inline-block;font-size:0.68rem;font-weight:600;padding:2px 8px;background:var(--accent-bg);color:var(--accent);border:1px solid rgba(255,107,53,0.18);border-radius:99px}
.tag.g{background:var(--success-bg);color:var(--success);border-color:rgba(34,197,94,0.18)}
.tag.r{background:var(--danger-bg);color:var(--danger);border-color:rgba(239,68,68,0.18)}
.tag.n{background:var(--surface2);color:var(--text2);border-color:var(--border2)}

.stat-mini{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;text-align:center}
.stat-mini .val{font-size:1.25rem;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.stat-mini .lbl{font-size:0.62rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}

.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:10px}
.center{text-align:center}
.muted{color:var(--muted)}
.mono{font-family:var(--mono)}
.mt1{margin-top:0.75rem}
.mt2{margin-top:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0}

#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:var(--bg);padding:9px 20px;border-radius:99px;font-size:0.78rem;font-weight:600;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:9999;white-space:nowrap;box-shadow:var(--shadow-lg)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
::selection{background:rgba(255,107,53,0.2);color:var(--text)}

@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pop{animation:pop 0.2s ease}.shake{animation:shake 0.25s ease}.fadein{animation:fadein 0.25s ease both}.pulse{animation:pulse 1.5s infinite}</style>
</head>
<body>
<div id="home"><div class="wrap">
  <header class="home-header">
    <div class="eyebrow">totally not for class</div>
    <h1>clase<span class="dot">.</span>fun</h1>
    <p>18 juegos · todo guardado · sin excusas</p>
  </header>
  <div class="games-grid" id="games-grid"></div>
</div></div>
<div id="game-shell"><div class="wrap">
  <header class="shell-header">
    <button class="back-btn" onclick="goHome()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      back
    </button>
    <span class="shell-title" id="shell-title"></span>
    <div class="shell-score-bar" id="shell-score-bar"></div>
  </header>
  <div id="game-root"></div>
</div></div>
<div id="toast"></div>
<script>
const Store={get(k,d=null){try{const v=localStorage.getItem('cf_'+k);return v===null?d:JSON.parse(v);}catch{return d;}},set(k,v){try{localStorage.setItem('cf_'+k,JSON.stringify(v));}catch{}}};
function toast(msg,dur=2200){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),dur);}
function fmtNum(n){if(n>=1e12)return(n/1e12).toFixed(2)+'T';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString();}
function popEl(el){if(!el)return;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
const Games=[];
function registerGame(cfg){Games.push(cfg);}
let currentCleanup=null;

function openGame(id){
  const g=Games.find(x=>x.id===id);if(!g)return;
  if(currentCleanup){currentCleanup();currentCleanup=null;}
  document.getElementById('home').style.display='none';
  const shell=document.getElementById('game-shell');shell.classList.add('active');
  document.getElementById('shell-title').textContent=g.name;
  document.getElementById('shell-score-bar').innerHTML='';
  // Apply per-game theme to shell bg
  const t=g.theme;
  if(t){
    shell.style.background=t.bg||'';
    shell.style.minHeight='100vh';
    shell.style.transition='background 0.4s';
  } else {
    shell.style.background='';
  }
  const root=document.getElementById('game-root');root.innerHTML='';
  currentCleanup=g.init(root)||null;
  window.scrollTo(0,0);
}

function goHome(){
  if(currentCleanup){currentCleanup();currentCleanup=null;}
  const shell=document.getElementById('game-shell');
  shell.classList.remove('active');
  shell.style.background='';
  document.getElementById('home').style.display='';
  window.scrollTo(0,0);
}

function renderHome(){
  const grid=document.getElementById('games-grid');grid.innerHTML='';
  Games.forEach((g,i)=>{
    const el=document.createElement('div');el.className='game-card fadein';
    el.style.animationDelay=(i*30)+'ms';
    el.innerHTML=(g.tag?`<span class="gc-tag">${g.tag}</span>`:'')+
      `<span class="gc-num">${String(i+1).padStart(2,'0')}</span>`+
      `<span class="gc-abbr">${g.abbr||g.id.toUpperCase()}</span>`+
      `<div class="gc-name">${g.name}</div>`+
      `<div class="gc-desc">${g.desc}</div>`;
    // Apply game accent color to abbr
    if(g.theme){el.querySelector('.gc-abbr').style.color=g.theme.accent||'var(--accent)';}
    el.addEventListener('mouseenter',()=>{if(g.theme)el.querySelector('.gc-abbr').style.textShadow='0 0 12px '+g.theme.accent;});
    el.addEventListener('mouseleave',()=>{el.querySelector('.gc-abbr').style.textShadow='';});
    el.onclick=()=>openGame(g.id);grid.appendChild(el);
  });
}
document.addEventListener('DOMContentLoaded',renderHome);

registerGame({
  id:'clicker',abbr:'OLA',name:'La Ola',tag:'idle',
  desc:'Click para surfear. Upgrades, automation, el océano infinito.',
  theme:{bg:'#030d1a',accent:'#06b6d4'},
  init(root){
    const DEF={v:0,total:0,cp:1,ar:0,u:{}};
    let S=Store.get('ola_s',{...DEF,u:{}});
    let iv=null,wavIv=null,wt=0;

    const UPG=[
      {id:'wax',  n:'Cera',         d:'+1/click',  b:10,    sc:2.1,e:s=>{s.cp+=1;}},
      {id:'fins', n:'Quillas',      d:'+3/click',  b:60,    sc:2.3,e:s=>{s.cp+=3;}},
      {id:'leash',n:'Leash pro',    d:'+8/click',  b:300,   sc:2.4,e:s=>{s.cp+=8;}},
      {id:'dolph',n:'Delfin',       d:'+2/seg',    b:150,   sc:2.6,e:s=>{s.ar+=2;}},
      {id:'curr', n:'Corriente',    d:'+6/seg',    b:600,   sc:2.5,e:s=>{s.ar+=6;}},
      {id:'reef', n:'Arrecife',     d:'+15/seg',   b:2500,  sc:2.6,e:s=>{s.ar+=15;}},
      {id:'wave', n:'Ola perfecta', d:'+40/seg',   b:9000,  sc:2.7,e:s=>{s.ar+=40;}},
      {id:'x2c',  n:'Tabla x2',     d:'x2 click',  b:2500,  sc:3.0,e:s=>{s.cp*=2;}},
      {id:'x2a',  n:'Viento x2',    d:'x2 auto',   b:12000, sc:3.0,e:s=>{s.ar*=2;}},
      {id:'tsu',  n:'Tsunami',      d:'+200/seg',  b:50000, sc:2.9,e:s=>{s.ar+=200;}},
      {id:'nept', n:'Neptuno',      d:'+800/seg',  b:250000,sc:3.0,e:s=>{s.ar+=800;}},
    ];
    function cost(u){return Math.floor(u.b*Math.pow(u.sc,S.u[u.id]||0));}
    function save(){Store.set('ola_s',S);}

    root.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
        <div>
          <div style="position:relative;border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid rgba(6,182,212,0.18)">
            <canvas id="ola-cv" width="300" height="190" style="width:100%;display:block"></canvas>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:2px">
              <div style="font-size:0.58rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(6,182,212,0.55)">vibraciones</div>
              <div id="ck-v" style="font-family:var(--mono);font-size:2rem;font-weight:700;color:#cffafe;text-shadow:0 0 24px rgba(6,182,212,0.9);letter-spacing:-2px">0</div>
              <div id="ck-r" style="font-size:0.65rem;color:rgba(6,182,212,0.45)">+0/seg</div>
            </div>
            <button id="ola-btn" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;background:rgba(6,182,212,0.12);border:2px solid rgba(6,182,212,0.35);cursor:pointer;font-size:1.6rem;transition:all 0.1s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)">〜</button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
            <div style="background:rgba(6,182,212,0.05);border:1px solid rgba(6,182,212,0.1);border-radius:8px;padding:9px;text-align:center">
              <div style="font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(6,182,212,0.4);margin-bottom:3px">total</div>
              <div id="ck-t" style="font-family:var(--mono);font-size:0.88rem;font-weight:600;color:#cffafe">0</div>
            </div>
            <div style="background:rgba(6,182,212,0.05);border:1px solid rgba(6,182,212,0.1);border-radius:8px;padding:9px;text-align:center">
              <div style="font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(6,182,212,0.4);margin-bottom:3px">upgrades</div>
              <div id="ck-upg" style="font-family:var(--mono);font-size:0.88rem;font-weight:600;color:#cffafe">0</div>
            </div>
          </div>
          <button id="ola-reset-btn" class="btn sm danger" onclick="olaReset()">reset</button>
        </div>
        <div>
          <div style="font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">upgrades</div>
          <div id="ck-shop" style="display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto"></div>
        </div>
      </div>`;

    // animated ocean canvas
    const cv2=document.getElementById('ola-cv');
    const c2=cv2.getContext('2d');
    const W2=300,H2=190;
    function drawOcean(){
      wt+=0.025;
      c2.clearRect(0,0,W2,H2);
      // sky bg
      const sk=c2.createLinearGradient(0,0,0,H2);
      sk.addColorStop(0,'#030d1a');sk.addColorStop(0.55,'#041828');sk.addColorStop(1,'#062040');
      c2.fillStyle=sk;c2.fillRect(0,0,W2,H2);
      // stars
      for(let i=0;i<18;i++){const sx=((i*79+wt*8)%W2),sy=(i*23)%75;c2.fillStyle='rgba(200,230,255,'+(0.2+Math.sin(wt+i)*0.15)+')';c2.fillRect(sx,sy,i%3===0?1.5:1,i%3===0?1.5:1);}
      // moon
      c2.fillStyle='rgba(220,240,255,0.85)';c2.beginPath();c2.arc(W2-28,22,12,0,Math.PI*2);c2.fill();
      c2.fillStyle='#030d1a';c2.beginPath();c2.arc(W2-23,19,10,0,Math.PI*2);c2.fill();
      // waves 4 layers
      const wy=H2*0.52;
      for(let w=3;w>=0;w--){
        c2.fillStyle='rgba(6,182,212,'+(0.1+w*0.1)+')';
        c2.beginPath();c2.moveTo(0,H2);
        for(let x=0;x<=W2;x+=3){
          const y=wy+w*7+Math.sin((x*0.028)+(wt*(0.8+w*0.25)))*( 7+w*4)+Math.sin((x*0.06)+(wt*0.6+w*0.4))*(3+w*2);
          c2.lineTo(x,y);
        }
        c2.lineTo(W2,H2);c2.lineTo(0,H2);c2.closePath();c2.fill();
      }
      // surfer
      const sx2=W2/2+Math.sin(wt*0.7)*20;
      const sy2=wy-14+Math.sin(wt*1.1)*5;
      c2.fillStyle='rgba(6,182,212,0.35)';
      c2.beginPath();c2.ellipse(sx2,sy2+9,16,3,Math.sin(wt*0.5)*0.25,0,Math.PI*2);c2.fill();
      c2.fillStyle='rgba(6,182,212,0.5)';c2.fillRect(sx2-4,sy2-2,8,11);
      c2.beginPath();c2.arc(sx2,sy2-5,5,0,Math.PI*2);c2.fill();
      // foam
      for(let i=0;i<6;i++){const fx=((i*48+wt*30)%W2),fy=wy+Math.sin(fx*0.05+wt)*8;c2.fillStyle='rgba(255,255,255,0.35)';c2.beginPath();c2.arc(fx,fy,1.5,0,Math.PI*2);c2.fill();}
    }
    wavIv=setInterval(drawOcean,33);

    function rc(){
      const v=document.getElementById('ck-v');
      if(v)v.textContent=fmtNum(S.v);
      const t=document.getElementById('ck-t');if(t)t.textContent=fmtNum(S.total);
      const r=document.getElementById('ck-r');if(r)r.textContent='+'+fmtNum(S.ar)+'/seg · +'+fmtNum(S.cp)+'/c';
      const u=document.getElementById('ck-upg');if(u)u.textContent=Object.values(S.u).reduce((a,b)=>a+b,0);
    }

    function rs(){
      const sh=document.getElementById('ck-shop');if(!sh)return;
      sh.innerHTML='';
      UPG.forEach(u=>{
        const c=cost(u),cnt=S.u[u.id]||0,can=S.v>=c;
        const el=document.createElement('div');
        el.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:rgba(6,182,212,'+(can?'0.07':'0.02')+');border:1px solid rgba(6,182,212,'+(can?'0.25':'0.07')+');border-radius:6px;cursor:'+(can?'pointer':'default')+';opacity:'+(can?1:0.38)+';transition:all 0.12s';

        ctx.fillStyle='rgba(148,163,184,0.055)';

        ctx.beginPath();ctx.ellipse(c.x-18*c.s,c.y+5*c.s,22*c.s,10*c.s,0,0,Math.PI*2);ctx.fill();

      ctx.strokeStyle='rgba(56,189,248,0.2)';ctx.lineWidth=2;ctx.beginPath();

      const pTop=ducking?GY+PH-pH:py;

      // Shadow
      const sw=(PW*0.5)*(0.4+0.6*Math.max(0,1-(GY-py)/60));

      // Player
      if(state!=='dead'){

        if(state==='run'&&frame%20===0)

      }

      // Obstacles
      obs.forEach(o=>{
        if(state==='run')o.x-=spd;
        const oy=o.type==='a'?(o.baseY+Math.sin(frame*0.055+o.bob)*9):o.y;
        o.draw(o.x,oy);

        if(state==='run'){
          const ox1=o.x+3,ox2=o.x+o.w-3;
          const oy1=oy+3,oy2=oy+o.h-3;

      // HUD
      ctx.fillStyle='rgba(56,189,248,0.5)';ctx.font='500 11px JetBrains Mono,monospace';ctx.textAlign='left';
      ctx.fillText(String(Math.floor(score)).padStart(6,'0'),10,20);

        ctx.fillStyle='#e2e8f0';ctx.font='600 20px Inter,sans-serif';ctx.textAlign='center';

        ctx.font='500 12px JetBrains Mono,monospace';ctx.fillStyle='#64748b';
        ctx.fillText(String(Math.floor(score)).padStart(6,'0')+'  ·  best '+String(Math.floor(hi)).padStart(6,'0'),W/2,H/2+6);
        ctx.fillStyle='#38bdf8';ctx.font='500 11px Inter,sans-serif';
        ctx.fillText('click or space to retry',W/2,H/2+26);

    }

    function drawPlayer(pTop,pH){
      // body
      ctx.fillStyle='#1d4ed8';ctx.fillRect(PX,pTop,PW,pH);
      // accent stripe at bottom
      ctx.fillStyle='#2563eb';ctx.fillRect(PX,pTop+pH-5,PW,5);
      // helmet
      ctx.fillStyle='#0ea5e9';ctx.beginPath();ctx.arc(PX+PW/2,pTop+7,9,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.72)';ctx.beginPath();ctx.arc(PX+PW/2-2,pTop+5,4,0,Math.PI*2);ctx.fill();
      // legs (only when on ground and not ducking)
      if(onGround&&pH>PH*0.6){
        const leg=Math.sin(frame*0.38)*(state==='run'?4:0);
        ctx.fillStyle='#1e40af';
        ctx.fillRect(PX+3,pTop+pH,5,6+leg);ctx.fillRect(PX+PW-8,pTop+pH,5,6-leg);

      }
    }

    function renderPtcls(){
      ptcls.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.bubble){p.vy*=0.97;p.r+=0.03;p.life-=0.01;}
        else{p.vy+=0.18;p.life-=0.03;}

        else{ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r/2,0,Math.PI*2);ctx.fill();}
      });
      ctx.globalAlpha=1;
      ptcls=ptcls.filter(p=>p.life>0&&p.r<18);
    }

    loop(); // single loop, always running for idle animation

    return()=>{
      cancelAnimationFrame(raf);raf=null;
      document.removeEventListener('keydown',onKey);
      document.removeEventListener('keyup',onKey);
    };
  }
});

      {id:'moon',    col:'#f97316', draw(ctx,cx,cy,r){ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(cx,cy,r*0.35,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a0f30';ctx.beginPath();ctx.arc(cx+r*0.12,cy-r*0.06,r*0.27,0,Math.PI*2);ctx.fill();}},

      cards.forEach((card,i)=>{

});
registerGame({
  id:'timer',abbr:'TIME',name:'Adivina el tiempo',tag:'reflejos',
  desc:'Para exactamente en el tiempo elegido. Sin mirar el reloj.',
  theme:{bg:'#0a0a0a',accent:'#eab308'},
  init(root){
    const MODES=[5,10,15,30,60];
    let mode=10,running=false,start=0,iv=null,clockAnim=0,clockIv=null;
    const hist=Store.get('timer_hist',[]);

    root.innerHTML=`
      <div style="max-width:480px;margin:0 auto">
        <!-- clock visual -->
        <div style="position:relative;border-radius:14px;overflow:hidden;margin-bottom:16px;border:1px solid rgba(234,179,8,0.15)">
          <canvas id="clock-cv" width="480" height="180" style="width:100%;display:block"></canvas>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:4px">
            <div style="font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(234,179,8,0.45)">objetivo</div>
            <div id="tm-target" style="font-family:var(--mono);font-size:3rem;font-weight:700;color:#fef9c3;text-shadow:0 0 30px rgba(234,179,8,0.6);letter-spacing:-2px">${mode}s</div>
            <div id="tm-sub" style="font-size:0.72rem;color:rgba(234,179,8,0.4)">elige modo y presiona inicio</div>
          </div>
        </div>

        <!-- mode buttons -->
        <div style="display:flex;justify-content:center;gap:6px;margin-bottom:14px" id="tm-modes">
          ${MODES.map(m=>`<button class="btn sm${m===mode?' accent':''}" onclick="tmMode(${m})" style="${m===mode?'background:#eab308;color:#0a0a0a;border-color:#eab308':''}">${m}s</button>`).join('')}
        </div>

        <!-- action buttons -->
        <div style="display:flex;justify-content:center;gap:10px;margin-bottom:16px">
          <button id="tm-go" style="padding:12px 36px;background:#eab308;color:#0a0a0a;border:none;border-radius:8px;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.12s;letter-spacing:0.02em" onclick="tmGo()">iniciar</button>
          <button id="tm-stop" style="display:none;padding:12px 36px;background:#1a1a1a;color:#eab308;border:2px solid #eab308;border-radius:8px;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.12s;letter-spacing:0.02em" onclick="tmStop()">STOP</button>
        </div>

        <div id="tm-result" style="display:none;margin-bottom:16px"></div>

        <!-- history -->
        <div>
          <div style="font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">historial</div>
          <div id="tm-hist" style="display:flex;flex-direction:column;gap:5px"></div>
        </div>
      </div>`;

    // Clock canvas
    const cv=document.getElementById('clock-cv');
    const ctx=cv.getContext('2d');
    const CW=480,CH=180;

    function drawClock(){
      clockAnim+=0.015;
      ctx.clearRect(0,0,CW,CH);
      const bg=ctx.createLinearGradient(0,0,0,CH);
      bg.addColorStop(0,'#0a0a0a');bg.addColorStop(1,'#111108');
      ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);

      // grid dots
      ctx.fillStyle='rgba(234,179,8,0.06)';
      for(let x=20;x<CW;x+=24)for(let y=16;y<CH;y+=24){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}

      // analog clock rings (decorative)
      const cx=CW/2,cy=CH/2;
      for(let r=2;r>=0;r--){
        const rad=50+r*22;
        ctx.strokeStyle='rgba(234,179,8,'+(0.04+r*0.03)+')';
        ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.stroke();
      }
      // tick marks
      for(let i=0;i<12;i++){
        const a=i*Math.PI/6;const r=70;
        ctx.fillStyle='rgba(234,179,8,'+(i%3===0?0.35:0.12)+')';
        ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,i%3===0?2:1,0,Math.PI*2);ctx.fill();
      }

      if(running){
        // spinning hand — user can't see time, but sees motion
        const elapsed=(Date.now()-start)/1000;
        const angle=-Math.PI/2+elapsed*Math.PI/5; // one full rotation = 10 seconds
        ctx.strokeStyle='rgba(234,179,8,0.7)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle)*58,cy+Math.sin(angle)*58);ctx.stroke();
        // center dot
        ctx.fillStyle='#eab308';ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
        // redacted display — bars instead of numbers
        ctx.fillStyle='rgba(234,179,8,0.12)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx-40,cy-20,80,16,3);else ctx.rect(cx-40,cy-20,80,16);ctx.fill();
        ctx.fillStyle='rgba(234,179,8,0.12)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx-28,cy+4,56,12,3);else ctx.rect(cx-28,cy+4,56,12);ctx.fill();
      } else {
        // idle — gentle pulsing center
        const pulse=0.6+Math.sin(clockAnim*2)*0.15;
        ctx.fillStyle='rgba(234,179,8,'+pulse*0.4+')';ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(234,179,8,'+pulse*0.6+')';ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
      }

      // side decorations — waveform
      for(let s=-1;s<=1;s+=2){
        ctx.strokeStyle='rgba(234,179,8,0.1)';ctx.lineWidth=1;ctx.beginPath();
        for(let x=0;x<CW;x+=3){
          const y=CH/2+Math.sin((x*0.05+clockAnim)*s)*20*Math.sin(x/CW*Math.PI);
          if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
    }
    clockIv=setInterval(drawClock,33);

    window.tmMode=m=>{
      if(running)return;
      mode=m;
      document.querySelectorAll('#tm-modes button').forEach(b=>{
        const bm=parseInt(b.textContent);
        b.className='btn sm'+(bm===m?' accent':'');
        b.style.cssText=bm===m?'background:#eab308;color:#0a0a0a;border-color:#eab308':'';
      });
      document.getElementById('tm-target').textContent=mode+'s';
      document.getElementById('tm-sub').textContent='elige modo y presiona inicio';
      document.getElementById('tm-result').style.display='none';
    };

    window.tmGo=()=>{
      running=true;start=Date.now();
      document.getElementById('tm-go').style.display='none';
      document.getElementById('tm-stop').style.display='';
      document.getElementById('tm-result').style.display='none';
      document.getElementById('tm-target').textContent='???';
      document.getElementById('tm-sub').textContent='no mires el reloj...';
    };

    window.tmStop=()=>{
      if(!running)return;
      running=false;
      const elapsed=(Date.now()-start)/1000;
      const diff=Math.abs(elapsed-mode);
      const pct=Math.max(0,Math.round((1-diff/mode)*100));
      const grade=diff<mode*0.015?'perfecto':diff<mode*0.04?'excelente':diff<mode*0.08?'muy bien':diff<mode*0.15?'bien':diff<mode*0.25?'cerca':'lejos';
      const color=diff<mode*0.05?'#22c55e':diff<mode*0.15?'#eab308':'#ef4444';

      document.getElementById('tm-target').textContent=mode+'s';
      document.getElementById('tm-sub').textContent='';
      document.getElementById('tm-go').style.display='';
      document.getElementById('tm-stop').style.display='none';

      const r=document.getElementById('tm-result');r.style.display='block';
      r.innerHTML=`
        <div style="background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.15);border-radius:10px;padding:16px;text-align:center">
          <div style="font-family:var(--mono);font-size:2.5rem;font-weight:700;color:${color};letter-spacing:-2px">${elapsed.toFixed(2)}s</div>
          <div style="font-size:0.78rem;color:var(--muted);margin-top:4px">objetivo ${mode}s · diferencia ${diff.toFixed(2)}s · <span style="color:${color}">${grade}</span></div>
        </div>`;

      hist.unshift({target:mode,t:parseFloat(elapsed.toFixed(2)),diff:parseFloat(diff.toFixed(2)),pct,grade});
      if(hist.length>10)hist.pop();
      Store.set('timer_hist',hist);
      renderHist();
    };

    function renderHist(){
      document.getElementById('tm-hist').innerHTML=hist.slice(0,8).map((h,i)=>{
        const color=h.diff<h.target*0.05?'#22c55e':h.diff<h.target*0.15?'#eab308':'#ef4444';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:0.78rem">
          <span style="font-family:var(--mono);color:var(--muted)">${String(i+1).padStart(2,'0')}</span>
          <span>objetivo <b style="font-family:var(--mono)">${h.target}s</b></span>
          <span style="font-family:var(--mono)">${h.t}s</span>
          <span style="color:${color};font-family:var(--mono)">±${h.diff}s</span>
          <span style="color:${color};font-size:0.68rem">${h.grade}</span>
        </div>`;
      }).join('');
    }
    renderHist();
    return()=>{clearInterval(clockIv);};
  }
});

registerGame({
  id: 'reaction',
  name: 'Tiempo de reacción',
  icon: '⚡',
  desc: 'Espera el verde, haz click. ¿Eres más rápido que un guepardo?',
  tag: 'reflejos',
  init(root) {
    let phase = 'idle'; // idle | waiting | ready | result
    let startTime = 0;
    let timeout = null;
    let results = Store.get('reaction_results', []);

    function avg(arr) { return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }
    function best(arr) { return arr.length ? Math.min(...arr) : 0; }

    const RANKS = [
      [150, '🐆 Guepardo'],
      [200, '🦅 Águila'],
      [250, '🐇 Conejo'],
      [300, '😎 Humano promedio'],
      [400, '🐢 Tortuga'],
      [Infinity, '🪨 Roca'],
    ];
    function rank(ms) { return RANKS.find(([t]) => ms < t)[1]; }

    root.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
        <div>
          <div id="rt-box" style="
            height:260px;border-radius:var(--radius-lg);
            background:var(--bg2);border:2px solid var(--border);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            cursor:pointer;user-select:none;transition:background 0.1s;margin-bottom:12px
          ">
            <div id="rt-icon" style="font-size:3rem;margin-bottom:12px">👁️</div>
            <div id="rt-msg" style="font-size:1rem;color:var(--muted)">haz click para empezar</div>
            <div id="rt-result" style="font-size:2.5rem;font-family:var(--serif);font-weight:400;display:none"></div>
          </div>
          <div class="row" style="justify-content:center">
            <div class="card center" style="flex:1"><div class="label-sm">mejor</div><div style="font-size:1.3rem;font-weight:600" id="rt-best">${best(results) || '—'}${results.length?'ms':''}</div></div>
            <div class="card center" style="flex:1"><div class="label-sm">promedio</div><div style="font-size:1.3rem;font-weight:600" id="rt-avg">${avg(results) || '—'}${results.length?'ms':''}</div></div>
            <div class="card center" style="flex:1"><div class="label-sm">intentos</div><div style="font-size:1.3rem;font-weight:600" id="rt-count">${results.length}</div></div>
          </div>
        </div>
        <div>
          <div class="label-sm" style="margin-bottom:8px">últimos intentos</div>
          <div id="rt-history" class="col" style="gap:6px"></div>
          ${results.length >= 3 ? `<button class="btn sm" style="margin-top:12px;color:var(--danger);border-color:var(--danger)" onclick="reactionReset()">limpiar historial</button>` : ''}
        </div>
      </div>
    `;

    function renderHistory() {
      const el = document.getElementById('rt-history');
      el.innerHTML = results.slice(0,8).map((r,i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
          <span style="color:var(--muted)">#${i+1}</span>
          <span style="font-family:var(--mono);font-weight:500">${r}ms</span>
          <span style="color:var(--muted)">${rank(r)}</span>
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('rt-best').textContent = results.length ? best(results) + 'ms' : '—';
      document.getElementById('rt-avg').textContent = results.length ? avg(results) + 'ms' : '—';
      document.getElementById('rt-count').textContent = results.length;
    }

    const box = document.getElementById('rt-box');
    const icon = document.getElementById('rt-icon');
    const msg = document.getElementById('rt-msg');
    const res = document.getElementById('rt-result');

    function setState(p) {
      phase = p;
      res.style.display = 'none'; msg.style.display = 'block';
      if (p === 'idle') {
        box.style.background = 'var(--bg2)'; box.style.borderColor = 'var(--border)';
        icon.textContent = '👁️'; msg.textContent = 'haz click para empezar';
      } else if (p === 'waiting') {
        box.style.background = '#2a1010'; box.style.borderColor = '#5a2020';
        icon.textContent = '🔴'; msg.textContent = 'espera...';
      } else if (p === 'ready') {
        box.style.background = '#0f2a1a'; box.style.borderColor = '#1a5a30';
        icon.textContent = '🟢'; msg.textContent = '¡AHORA!';
        startTime = Date.now();
      } else if (p === 'tooEarly') {
        box.style.background = '#2a2010'; box.style.borderColor = '#7a6010';
        icon.textContent = '⚠️'; msg.textContent = 'demasiado pronto — click para reintentar';
      }
    }

    box.onclick = () => {
      if (phase === 'idle' || phase === 'result' || phase === 'tooEarly') {
        setState('waiting');
        clearTimeout(timeout);
        timeout = setTimeout(() => setState('ready'), 1000 + Math.random() * 3000);
      } else if (phase === 'waiting') {
        clearTimeout(timeout);
        setState('tooEarly');
      } else if (phase === 'ready') {
        const ms = Date.now() - startTime;
        results.unshift(ms);
        if (results.length > 20) results.pop();
        Store.set('reaction_results', results);
        phase = 'result';
        box.style.background = 'var(--bg2)'; box.style.borderColor = 'var(--border)';
        icon.textContent = '⚡';
        msg.style.display = 'none'; res.style.display = 'block';
        res.textContent = ms + 'ms';
        msg.textContent = rank(ms) + ' — click para repetir';
        msg.style.display = 'block';
        updateStats(); renderHistory();
        if (ms === best(results)) toast('🏆 Nuevo récord: ' + ms + 'ms!');
      }
    };

    renderHistory(); updateStats();

    window.reactionReset = () => {
      results = []; Store.set('reaction_results', []);
      updateStats(); renderHistory(); setState('idle');
      toast('Historial limpiado');
    };

    return () => clearTimeout(timeout);
  }
});
registerGame({
  abbr:'AIM',
  id:'aim',
  theme:{bg:'#0a0f0a',accent:'#4ade80'}, name:'Bubble Pop', icon:'🫧',
  desc:'Revienta las burbujas antes de que escapen. 30 segundos de caos puro.',
  tag:'puntería',
  init(root){
    const DUR=30,LIFE=1900,MAX=7;
    let running=false,raf=null,timeLeft=DUR,lastTick=0,targets=[],hits=0,misses=0,score=0;
    let stats=Store.get('aim_stats',{best:0,bestAcc:0,games:0});
    let W=560,H=300;

    root.innerHTML=`
      <div class="card" style="padding:10px;margin-bottom:12px">
        <canvas id="aim-canvas" width="${W}" height="${H}" style="width:100%;max-width:${W}px;display:block;border-radius:8px;cursor:crosshair"></canvas>
      </div>
      <div class="row" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div class="row" style="gap:8px">
          <div class="score-chip">tiempo: <b id="aim-time">${DUR}s</b></div>
          <div class="score-chip">hits: <b id="aim-hits">0</b></div>
          <div class="score-chip">precisión: <b id="aim-acc">—</b></div>
          <div class="score-chip">récord: <b id="aim-best">${stats.best}</b></div>
        </div>
        <button class="btn accent" onclick="aimStart()">iniciar (30s)</button>
      </div>`;

    const canvas=document.getElementById('aim-canvas');
    const ctx=canvas.getContext('2d');
    W=canvas.offsetWidth||W;H=canvas.offsetHeight||H;

    const COLORS=['#5b9cf6','#f0a500','#5eb97e','#e05252','#c77dff','#ff6b9d','#00d4ff'];

    function rndTarget(){const r=16+Math.random()*22,color=COLORS[~~(Math.random()*COLORS.length)];return{x:r+Math.random()*(W-r*2),y:r+Math.random()*(H-r*2),r,born:Date.now(),life:LIFE-Math.min(score*1.5,500),color,id:Math.random(),wobble:Math.random()*Math.PI*2};}

    function aimStart(){running=true;hits=0;misses=0;score=0;targets=[];timeLeft=DUR;lastTick=Date.now();document.getElementById('aim-start')||null;document.getElementById('aim-hits').textContent=0;document.getElementById('aim-acc').textContent='—';document.getElementById('aim-time').textContent=DUR+'s';if(!raf)loop();}
    window.aimStart=aimStart;

    function end(){running=false;const acc=hits+misses>0?Math.round(hits/(hits+misses)*100):0;if(score>stats.best)stats.best=score;if(acc>stats.bestAcc)stats.bestAcc=acc;stats.games++;Store.set('aim_stats',stats);document.getElementById('aim-best').textContent=stats.best;targets=[];drawEnd(score,acc);}

    function loop(){raf=requestAnimationFrame(loop);const now=Date.now();
      if(running){const dt=now-lastTick;lastTick=now;timeLeft=Math.max(0,timeLeft-dt/1000);document.getElementById('aim-time').textContent=Math.ceil(timeLeft)+'s';if(timeLeft<=0){end();return;}
        if(targets.length<MAX&&Math.random()<0.05)targets.push(rndTarget());
        targets.forEach(t=>{if(now-t.born>t.life){misses++;targets=targets.filter(x=>x.id!==t.id);}});
      }
      draw(now);
    }

    function draw(now){ctx.clearRect(0,0,W,H);ctx.fillStyle='#18160f';ctx.fillRect(0,0,W,H);
      // subtle grid
      ctx.strokeStyle='rgba(240,220,130,0.04)';ctx.lineWidth=1;
      for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
      for(let i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

      if(running){ctx.fillStyle='var(--border)';ctx.fillRect(0,0,W,5);ctx.fillStyle=timeLeft<8?'#e05252':'#f0a500';ctx.fillRect(0,0,W*(timeLeft/DUR),5);}

      targets.forEach(t=>{
        const age=(now-t.born)/t.life;
        const wobX=Math.sin(now/400+t.wobble)*3;
        const wobY=Math.cos(now/350+t.wobble)*2;
        const cx=t.x+wobX,cy=t.y+wobY;
        const pulse=1+0.05*Math.sin(now/200+t.wobble);

        // glow
        const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,t.r*2);grd.addColorStop(0,t.color+'33');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,t.r*2,0,Math.PI*2);ctx.fill();

        // life ring
        ctx.beginPath();ctx.arc(cx,cy,t.r+5,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-age));ctx.strokeStyle=age>0.65?'#e05252':t.color;ctx.lineWidth=2.5;ctx.stroke();

        // bubble
        ctx.beginPath();ctx.arc(cx,cy,t.r*pulse,0,Math.PI*2);
        const bg=ctx.createRadialGradient(cx-t.r*0.3,cy-t.r*0.3,t.r*0.1,cx,cy,t.r);
        bg.addColorStop(0,t.color+'55');bg.addColorStop(1,t.color+'18');
        ctx.fillStyle=bg;ctx.fill();
        ctx.strokeStyle=t.color;ctx.lineWidth=2;ctx.stroke();

        // shine
        ctx.beginPath();ctx.arc(cx-t.r*0.28,cy-t.r*0.28,t.r*0.22,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
      });

      if(!running&&targets.length===0&&timeLeft===DUR){ctx.fillStyle='rgba(240,220,150,0.5)';ctx.font='500 17px Playfair Display,serif';ctx.textAlign='center';ctx.fillText('haz click en "iniciar" para reventar burbujas',W/2,H/2);ctx.font='13px Cabinet Grotesk,sans-serif';ctx.fillStyle='#7a7260';ctx.fillText('30 segundos · haz click en las burbujas',W/2,H/2+26);}

      if(running){ctx.fillStyle='rgba(240,165,0,0.7)';ctx.font='500 13px Fira Code,monospace';ctx.textAlign='left';ctx.fillText('score: '+score,10,26);}
    }

    function drawEnd(sc,acc){ctx.fillStyle='rgba(13,11,7,0.88)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f0e8d0';ctx.font='500 22px Playfair Display,serif';ctx.textAlign='center';ctx.fillText('burbujas reventadas',W/2,H/2-28);ctx.font='14px Cabinet Grotesk,sans-serif';ctx.fillStyle='#7a7260';ctx.fillText(`hits: ${hits}  ·  misses: ${misses}  ·  precisión: ${acc}%`,W/2,H/2+2);ctx.fillStyle='#f0a500';ctx.font='500 22px Playfair Display,serif';ctx.fillText('score: '+sc,W/2,H/2+32);if(sc>=stats.best&&stats.games>0){ctx.fillStyle='#5eb97e';ctx.font='13px Cabinet Grotesk,sans-serif';ctx.fillText('🏆 nuevo récord',W/2,H/2+58);}}

    canvas.addEventListener('click',e=>{if(!running)return;const rect=canvas.getBoundingClientRect(),sx=W/rect.width,mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sx;let hit=false;for(let i=targets.length-1;i>=0;i--){const t=targets[i];if(Math.hypot(mx-t.x,my-t.y)<t.r+3){hit=true;score+=Math.round(10+(1-(Date.now()-t.born)/t.life)*18);targets.splice(i,1);hits++;document.getElementById('aim-hits').textContent=hits;document.getElementById('aim-acc').textContent=Math.round(hits/(hits+misses)*100)+'%';break;}}if(!hit)misses++;});

    loop();
    return()=>{cancelAnimationFrame(raf);raf=null;};
  }
});

  desc:'Responde rápido. Dificultad sube sin piedad. Modo hardcore disponible.',
  init(root){
    const DIFFS={
      easy:  {label:'Fácil',    lives:5, time:10000, gen:(sc)=>{const a=rr(2,15),b=rr(2,15),op=['+','-'][~~(Math.random()*2)];return op==='+'?{expr:`${a} + ${b}`,ans:a+b}:{expr:`${Math.max(a,b)} - ${Math.min(a,b)}`,ans:Math.abs(a-b)};}},
      medium:{label:'Medio',    lives:3, time:7000,  gen:(sc)=>{const ops=['+','-','×'];const op=ops[~~(Math.random()*ops.length)];if(op==='+'){const a=rr(5,50),b=rr(5,50);return{expr:`${a} + ${b}`,ans:a+b};}if(op==='-'){const a=rr(10,80),b=rr(2,a);return{expr:`${a} - ${b}`,ans:a-b};}const a=rr(2,12),b=rr(2,12);return{expr:`${a} × ${b}`,ans:a*b};}},
      hard:  {label:'Difícil',  lives:3, time:5500,  gen:(sc)=>{const ops=['+','-','×','÷','²'];const op=ops[~~(Math.random()*ops.length)];if(op==='+'){const a=rr(20,200),b=rr(20,200);return{expr:`${a} + ${b}`,ans:a+b};}if(op==='-'){const a=rr(30,250),b=rr(5,a);return{expr:`${a} - ${b}`,ans:a-b};}if(op==='×'){const a=rr(3,20),b=rr(3,20);return{expr:`${a} × ${b}`,ans:a*b};}if(op==='÷'){const b=rr(2,12),ans=rr(2,12);return{expr:`${b*ans} ÷ ${b}`,ans};}const a=rr(2,20);return{expr:`${a}²`,ans:a*a};}},
      expert:{label:'Experto',  lives:3, time:4000,  gen:(sc)=>{const r=Math.random();if(r<0.25){const a=rr(50,999),b=rr(50,999);return{expr:`${a} + ${b}`,ans:a+b};}if(r<0.5){const a=rr(100,999),b=rr(10,a);return{expr:`${a} - ${b}`,ans:a-b};}if(r<0.75){const a=rr(5,30),b=rr(5,30);return{expr:`${a} × ${b}`,ans:a*b};}const b=rr(3,20),ans=rr(3,25);return{expr:`${b*ans} ÷ ${b}`,ans};}},
      hardcore:{label:'HARDCORE',lives:1, time:2500,  gen:(sc)=>{const r=Math.random();if(r<0.2){const a=rr(100,9999),b=rr(100,9999);return{expr:`${a} + ${b}`,ans:a+b};}if(r<0.35){const a=rr(200,9999),b=rr(50,a);return{expr:`${a} - ${b}`,ans:a-b};}if(r<0.5){const a=rr(10,50),b=rr(10,50);return{expr:`${a} × ${b}`,ans:a*b};}if(r<0.65){const b=rr(5,25),ans=rr(5,40);return{expr:`${b*ans} ÷ ${b}`,ans};}if(r<0.8){const a=rr(5,30);return{expr:`${a}²`,ans:a*a};}const a=rr(2,10);return{expr:`${a}³`,ans:a*a*a};}},
    };
    const DIFF_KEYS=Object.keys(DIFFS);

    function rr(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
    function wrongs(ans,n){const s=new Set();while(s.size<n){const d=rr(1,Math.max(3,Math.ceil(Math.abs(ans)*0.25)+3));const v=ans+(Math.random()<0.5?d:-d);if(v!==ans&&v>=0)s.add(Math.round(v));}return[...s];}

    let diff='medium',score=0,streak=0,lives=0,timer=null,barIv=null,barStart=0,running=false;
    const hiKey=()=>'math_hi_'+diff;

    root.innerHTML=`
      <div style="max-width:460px;margin:0 auto">
        <div class="row" style="justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap" id="mb-diffs">
          ${DIFF_KEYS.map(k=>`<button class="btn sm${k===diff?' accent':''}" onclick="mbDiff('${k}')" 
            style="${k==='hardcore'?'color:#ef4444;border-color:rgba(239,68,68,0.3)':''}">${DIFFS[k].label}</button>`).join('')}
        </div>
        <div class="row" style="justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div class="row" style="gap:8px">
            <div class="score-chip">pts <b id="mb-score">0</b></div>
            <div class="score-chip">racha <b id="mb-streak">0</b></div>
            <div class="score-chip">récord <b id="mb-hi">${Store.get('math_hi_medium',{s:0}).s||0}</b></div>
          </div>
          <div id="mb-lives" style="font-size:1.2rem;letter-spacing:3px"></div>
        </div>
        <div class="card" style="background:rgba(129,140,248,0.04);border-color:rgba(129,140,248,0.15);margin-bottom:12px;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px">
          <div style="width:100%;height:4px;background:var(--surface3);border-radius:99px;overflow:hidden">
            <div id="mb-bar" style="height:100%;background:#818cf8;border-radius:99px;width:100%;transition:width 0.08s linear"></div>
          </div>
          <div id="mb-expr" style="font-family:var(--mono);font-size:2.8rem;font-weight:700;color:var(--text);letter-spacing:-2px;text-align:center">?</div>
          <div id="mb-opts" class="row" style="justify-content:center;gap:8px;flex-wrap:wrap"></div>
          <div id="mb-fb" style="height:20px;font-size:0.85rem;font-weight:600"></div>
        </div>
        <div id="mb-start" class="card" style="text-align:center;background:rgba(129,140,248,0.04);border-color:rgba(129,140,248,0.15)">
          <div style="font-size:1.1rem;font-weight:600;margin-bottom:6px" id="mb-diff-label">Math Battle — Medio</div>
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:14px" id="mb-diff-desc">Operaciones mixtas · 3 vidas · 7s por pregunta</div>
          <div class="row" style="justify-content:center;gap:12px;margin-bottom:14px">
            <div class="stat-mini"><div class="lbl">récord</div><div class="val" id="mb-hi2">${Store.get('math_hi_medium',{s:0}).s||0}</div></div>
            <div class="stat-mini"><div class="lbl">racha máx</div><div class="val" id="mb-st2">${Store.get('math_hi_medium',{st:0}).st||0}</div></div>
          </div>
          <button class="btn accent" onclick="mbStart()">empezar</button>
        </div>
      </div>`;

    function updateDiffUI(){
      document.querySelectorAll('#mb-diffs button').forEach((b,i)=>{
        const k=DIFF_KEYS[i];b.className='btn sm'+(k===diff?' accent':'');
        if(k==='hardcore'){b.style.cssText=k===diff?'background:#ef4444;color:#fff;border-color:#ef4444':'color:#ef4444;border-color:rgba(239,68,68,0.3)';};
      });
      const d=DIFFS[diff];
      const el=document.getElementById('mb-diff-label');if(el)el.textContent='Math Battle — '+d.label;
      const de=document.getElementById('mb-diff-desc');if(de)de.textContent=descFor(diff);
      const hi=Store.get(hiKey(),{s:0,st:0});
      const h1=document.getElementById('mb-hi');if(h1)h1.textContent=hi.s||0;
      const h2=document.getElementById('mb-hi2');if(h2)h2.textContent=hi.s||0;
      const s2=document.getElementById('mb-st2');if(s2)s2.textContent=hi.st||0;
    }
    function descFor(d){const m={easy:'Sumas y restas · 5 vidas · 10s',medium:'Mixtas · 3 vidas · 7s',hard:'Avanzado con potencias · 3 vidas · 5.5s',expert:'Números grandes · 3 vidas · 4s',hardcore:'TODO · 1 vida · 2.5s — sin piedad'};return m[d]||'';}

    window.mbDiff=k=>{diff=k;updateDiffUI();const s=document.getElementById('mb-start');if(s)s.style.display='block';running=false;clearTimeout(timer);clearInterval(barIv);};
    window.mbStart=mbStart;

    function mbStart(){
      const d=DIFFS[diff];score=0;streak=0;lives=d.lives;running=true;
      document.getElementById('mb-start').style.display='none';
      updateLives();nextQ();
    }

    function updateLives(){
      const max=DIFFS[diff].lives;
      document.getElementById('mb-lives').textContent='♥'.repeat(lives)+'♡'.repeat(Math.max(0,max-lives));
      document.getElementById('mb-score').textContent=score;
      document.getElementById('mb-streak').textContent=streak;
    }

    let curQ=null;
    function nextQ(){
      clearTimeout(timer);clearInterval(barIv);
      if(!running)return;
      const d=DIFFS[diff];curQ=d.gen(score);
      const opts=[...wrongs(curQ.ans,3),curQ.ans].sort(()=>Math.random()-0.5);
      document.getElementById('mb-expr').textContent=curQ.expr+' = ?';
      document.getElementById('mb-fb').textContent='';document.getElementById('mb-fb').style.color='';
      const ob=document.getElementById('mb-opts');ob.innerHTML='';
      opts.forEach(opt=>{
        const btn=document.createElement('button');
        btn.className='btn';btn.style.cssText='min-width:74px;font-family:var(--mono);font-size:1.05rem;background:rgba(129,140,248,0.06);border-color:rgba(129,140,248,0.2)';
        btn.textContent=opt;btn.onclick=()=>answer(opt,btn);
        ob.appendChild(btn);
      });
      // timer bar
      barStart=Date.now();
      const tmax=d.time;
      document.getElementById('mb-bar').style.width='100%';
      document.getElementById('mb-bar').style.background='#818cf8';
      clearInterval(barIv);
      barIv=setInterval(()=>{
        const pct=1-(Date.now()-barStart)/tmax;
        const bar=document.getElementById('mb-bar');if(!bar){clearInterval(barIv);return;}
        bar.style.width=Math.max(0,pct*100)+'%';
        bar.style.background=pct<0.25?'#ef4444':pct<0.5?'#f59e0b':'#818cf8';
        if(pct<=0){clearInterval(barIv);timeUp();}
      },50);
    }

    function timeUp(){loseLife('⏰ tiempo');}

    function answer(val,btn){
      clearTimeout(timer);clearInterval(barIv);
      document.getElementById('mb-opts').querySelectorAll('button').forEach(b=>b.disabled=true);
      if(val===curQ.ans){
        streak++;score+=10+DIFF_KEYS.indexOf(diff)*8+Math.floor(streak/3)*5;
        btn.style.background='rgba(34,197,94,0.15)';btn.style.borderColor='#22c55e';
        document.getElementById('mb-fb').textContent=streak>4?`+${10+DIFF_KEYS.indexOf(diff)*8} · racha ${streak} 🔥`:`correcto`;
        document.getElementById('mb-fb').style.color='#22c55e';
        updateLives();setTimeout(nextQ,550);
      } else {
        document.getElementById('mb-opts').querySelectorAll('button').forEach(b=>{if(parseInt(b.textContent)===curQ.ans)b.style.background='rgba(34,197,94,0.12)';});
        btn.style.background='rgba(239,68,68,0.15)';btn.style.borderColor='#ef4444';
        loseLife('✗ incorrecto');
      }
    }

    function loseLife(msg){
      clearInterval(barIv);
      document.getElementById('mb-fb').textContent=msg;document.getElementById('mb-fb').style.color='#ef4444';
      streak=0;lives--;updateLives();
      document.getElementById('mb-opts').querySelectorAll('button').forEach(b=>b.disabled=true);
      if(lives<=0){setTimeout(endGame,600);}else setTimeout(nextQ,800);
    }

    function endGame(){
      running=false;clearInterval(barIv);
      const hi=Store.get(hiKey(),{s:0,st:0});
      const newHi=score>hi.s,newSt=streak>hi.st;
      if(newHi||newSt)Store.set(hiKey(),{s:Math.max(score,hi.s),st:Math.max(streak,hi.st)});
      document.getElementById('mb-expr').textContent='💀';
      document.getElementById('mb-opts').innerHTML='';document.getElementById('mb-fb').textContent='';
      const st=document.getElementById('mb-start');st.style.display='block';
      st.innerHTML=`<div style="font-weight:600;font-size:1rem;margin-bottom:8px">game over — ${DIFFS[diff].label}</div>
        <div class="row" style="justify-content:center;gap:10px;margin-bottom:12px">
          <div class="stat-mini"><div class="lbl">score</div><div class="val">${score}</div>${newHi?'<div style="font-size:0.6rem;color:#818cf8">nuevo récord</div>':''}</div>
          <div class="stat-mini"><div class="lbl">récord</div><div class="val">${Math.max(score,hi.s)}</div></div>
        </div>
        <button class="btn accent" onclick="mbStart()">jugar de nuevo</button>
        <button class="btn sm" style="margin-left:8px" onclick="mbDiff('${diff}')">cambiar dificultad</button>`;
      updateDiffUI();
    }
    updateDiffUI();
    return()=>{clearTimeout(timer);clearInterval(barIv);};
  }
});
registerGame({
  id:'minesweeper',
  theme:{bg:'#0a0f0a',accent:'#6b7280'},abbr:'MINE',name:'Minesweeper',tag:'puzzles',
  desc:'El clásico. Despeja el campo sin explotar. Tres niveles.',
  init(root){
    const LEVELS={easy:{r:9,c:9,m:10},medium:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
    let lvl='easy',board=[],revealed=[],flagged=[],started=false,over=false,won=false,timer=0,timerIv=null;
    const hi=Store.get('mine_hi',{easy:999,medium:999,hard:999});

    root.innerHTML=`
      <div>
        <div class="row" style="justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div class="row" style="gap:6px">
            ${Object.keys(LEVELS).map(l=>`<button class="btn sm${l===lvl?' accent':''}" onclick="mineLevel('${l}')">${l}</button>`).join('')}
          </div>
          <div class="row" style="gap:8px">
            <div class="score-chip">minas: <b id="mine-left">10</b></div>
            <div class="score-chip">tiempo: <b id="mine-time">0</b></div>
            <div class="score-chip">récord: <b id="mine-hi">${hi[lvl]}s</b></div>
          </div>
        </div>
        <div id="mine-status" style="font-size:0.78rem;color:var(--muted);margin-bottom:8px;font-family:var(--mono)">haz click para descubrir · click derecho para marcar mina</div>
        <div id="mine-board" style="overflow-x:auto;padding-bottom:4px"></div>
        <div id="mine-result" style="margin-top:12px"></div>
      </div>`;

    function newGame(){
      clearInterval(timerIv);timer=0;started=false;over=false;won=false;
      const {r,c,m}=LEVELS[lvl];
      board=Array.from({length:r},()=>Array(c).fill(0));
      revealed=Array.from({length:r},()=>Array(c).fill(false));
      flagged=Array.from({length:r},()=>Array(c).fill(false));
      document.getElementById('mine-time').textContent=0;
      document.getElementById('mine-left').textContent=m;
      document.getElementById('mine-result').innerHTML='';
      document.getElementById('mine-status').textContent='haz click para descubrir · click derecho para marcar mina';
      renderBoard();
    }
    window.mineLevel=l=>{lvl=l;document.querySelectorAll('#\\31 , button').forEach(()=>{});document.querySelectorAll('[onclick^="mineLevel"]').forEach(b=>b.className='btn sm'+(b.getAttribute('onclick').includes(`'${l}'`)?' accent':''));document.getElementById('mine-hi').textContent=hi[lvl]+'s';newGame();};

    function placeMines(er,ec){
      const{r,c,m}=LEVELS[lvl];let placed=0;
      while(placed<m){const mr=~~(Math.random()*r),mc=~~(Math.random()*c);if(board[mr][mc]!=-1&&!(mr===er&&mc===ec)){board[mr][mc]=-1;placed++;}}
      for(let i=0;i<r;i++)for(let j=0;j<c;j++){if(board[i][j]===-1)continue;let n=0;for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){const ni=i+di,nj=j+dj;if(ni>=0&&ni<r&&nj>=0&&nj<c&&board[ni][nj]===-1)n++;}board[i][j]=n;}
    }

    function reveal(r2,c2){
      const{r,c}=LEVELS[lvl];
      if(r2<0||r2>=r||c2<0||c2>=c||revealed[r2][c2]||flagged[r2][c2])return;
      revealed[r2][c2]=true;
      if(board[r2][c2]===0){for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++)reveal(r2+di,c2+dj);}
    }

    function checkWin(){const{r,c,m}=LEVELS[lvl];let unrevealed=0;for(let i=0;i<r;i++)for(let j=0;j<c;j++)if(!revealed[i][j])unrevealed++;return unrevealed===m;}

    const COLORS=['','#3b82f6','#22c55e','#ef4444','#7c3aed','#dc2626','#0891b2','#111','#555'];

    function renderBoard(){
      const{r,c}=LEVELS[lvl];const el=document.getElementById('mine-board');
      const cellSize=c>16?22:26;
      let html=`<div style="display:inline-grid;grid-template-columns:repeat(${c},${cellSize}px);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;user-select:none">`;
      for(let i=0;i<r;i++)for(let j=0;j<c;j++){
        const rev=revealed[i][j],flag=flagged[i][j],val=board[i][j];
        let bg='var(--surface2)',color='transparent',text='';
        if(rev){bg='var(--surface3)';if(val===-1){bg='var(--danger-bg)';text='×';color='var(--danger)';}else if(val>0){text=val;color=COLORS[val]||'#fff';}}
        else if(flag){text='!';color='var(--accent)';bg='var(--accent-bg)';}
        html+=`<div onclick="mineClick(${i},${j})" oncontextmenu="mineFlag(event,${i},${j})" style="width:${cellSize}px;height:${cellSize}px;background:${bg};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:${cellSize<24?'0.72rem':'0.82rem'};font-weight:700;color:${color};cursor:pointer;transition:background 0.05s;box-sizing:border-box${!rev&&!flag?';border-bottom:1px solid rgba(255,255,255,0.06);border-right:1px solid rgba(255,255,255,0.04)':''}">${text}</div>`;
      }
      html+='</div>';el.innerHTML=html;
    }

    function chordReveal(r2,c2){
      // If cell is revealed number, count adjacent flags
      if(!revealed[r2][c2]||board[r2][c2]<=0)return;
      const{r,c}=LEVELS[lvl];
      let adjFlags=0,adjUnrevealed=[];
      for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){
        const ni=r2+di,nj=c2+dj;
        if(ni<0||ni>=r||nj<0||nj>=c||(di===0&&dj===0))continue;
        if(flagged[ni][nj])adjFlags++;
        else if(!revealed[ni][nj])adjUnrevealed.push([ni,nj]);
      }
      if(adjFlags===board[r2][c2]){
        // Reveal all unflagged neighbors
        adjUnrevealed.forEach(([ni,nj])=>{
          if(board[ni][nj]===-1){revealAll();over=true;clearInterval(timerIv);renderBoard();document.getElementById('mine-result').innerHTML=`<div class="card center fadein"><div style="font-size:1.4rem;font-weight:700;color:var(--danger)">BOOM — mina marcada mal</div><div style="font-size:0.8rem;color:var(--muted);margin:6px 0">tiempo: ${timer}s</div><button class="btn accent" onclick="mineLevel('${lvl}')">jugar de nuevo</button></div>`;return;}
          reveal(ni,nj);
        });
        if(!over&&checkWin()){over=true;clearInterval(timerIv);/* win */}
        updateMineLeft();renderBoard();
      }
    }
    window.mineClick=(r2,c2)=>{
      if(over||won||flagged[r2][c2])return;
      if(revealed[r2][c2]&&board[r2][c2]>0){chordReveal(r2,c2);return;}
      if(!started){started=true;placeMines(r2,c2);timerIv=setInterval(()=>{timer++;document.getElementById('mine-time').textContent=timer;},1000);}
      if(board[r2][c2]===-1){revealAll();over=true;clearInterval(timerIv);renderBoard();document.getElementById('mine-status').textContent='';document.getElementById('mine-result').innerHTML=`<div class="card center fadein"><div style="font-size:1.4rem;font-weight:700;color:var(--danger)">BOOM</div><div style="font-size:0.8rem;color:var(--muted);margin:6px 0">tiempo: ${timer}s</div><button class="btn accent" onclick="mineLevel('${lvl}')">jugar de nuevo</button></div>`;return;}
      reveal(r2,c2);
      if(checkWin()){won=true;clearInterval(timerIv);if(timer<hi[lvl]){hi[lvl]=timer;Store.set('mine_hi',hi);document.getElementById('mine-hi').textContent=timer+'s';}renderBoard();document.getElementById('mine-status').textContent='';document.getElementById('mine-result').innerHTML=`<div class="card center fadein"><div style="font-size:1.4rem;font-weight:700;color:var(--success)">despejado</div><div style="font-size:0.8rem;color:var(--muted);margin:6px 0">${timer}s${timer<=hi[lvl]?' · nuevo récord!':''}</div><button class="btn accent" onclick="mineLevel('${lvl}')">otra partida</button></div>`;return;}
      updateMineLeft();renderBoard();
    };
    window.mineFlag=(e,r2,c2)=>{e.preventDefault();if(over||won||revealed[r2][c2])return;flagged[r2][c2]=!flagged[r2][c2];updateMineLeft();renderBoard();};
    function revealAll(){const{r,c}=LEVELS[lvl];for(let i=0;i<r;i++)for(let j=0;j<c;j++)if(board[i][j]===-1)revealed[i][j]=true;}
    function updateMineLeft(){const{m}=LEVELS[lvl];let flags=0;flagged.forEach(r=>r.forEach(f=>{if(f)flags++;}));document.getElementById('mine-left').textContent=m-flags;}

    newGame();
    return()=>clearInterval(timerIv);
  }
});

        </div>
      </div>`;

    let spinHistory=[];

    function renderReels(vals){
      [0,1,2].forEach(i=>{
        const inner=document.getElementById(`reel-inner-${i}`);if(!inner)return;
        // show 3 symbols: prev, current, next
        const syms=[-1,0,1].map(d=>{const idx=(vals[i]+d+SYMBOLS.length)%SYMBOLS.length;return SYMBOLS[idx];});
        inner.innerHTML=syms.map((s,si)=>`<div style="width:88px;height:34px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:${si===1?'2rem':'1.2rem'};color:${si===1?s.color:'rgba(255,255,255,0.15)'};opacity:${si===1?1:0.4}">${s.s}</div>`).join('');
      });
    }

    function updateCredits(){document.getElementById('sl-cr').textContent=credits;popEl(document.getElementById('sl-cr'));}

    window.slBet=b=>{if(spinning)return;bet=b;document.querySelectorAll('#sl-bets button').forEach(btn=>btn.className='btn sm'+(parseInt(btn.textContent)===b?' accent':''));};

    window.slSpin=()=>{
      if(spinning)return;
      if(credits<bet){toast('sin créditos — recarga');if(credits<=0){credits=100;save();updateCredits();}return;}
      credits-=bet;spins++;save();updateCredits();
      spinning=true;document.getElementById('sl-spin').disabled=true;
      document.getElementById('sl-msg').textContent='spinning...';
      document.getElementById('sl-line').style.transform='scaleX(0)';

      // animate reels
      const finalVals=[~~(Math.random()*SYMBOLS.length),~~(Math.random()*SYMBOLS.length),~~(Math.random()*SYMBOLS.length)];
      // apply weight
      const wFinal=finalVals.map(()=>POOL[~~(Math.random()*POOL.length)]);

      let ticks=[0,0,0];const maxTicks=[18,24,30];
      animiv=setInterval(()=>{
        let allDone=true;
        [0,1,2].forEach(i=>{if(ticks[i]<maxTicks[i]){ticks[i]++;reelValues[i][1]=(reelValues[i][1]+1)%SYMBOLS.length;renderReels(reelValues.map(r=>r[1]));allDone=false;}else{reelValues[i][1]=wFinal[i];}});
        renderReels(wFinal.map((v,i)=>ticks[i]>=maxTicks[i]?v:reelValues[i][1]));
        if(allDone){clearInterval(animiv);finalVals.splice(0,3,...wFinal);endSpin(wFinal);}
      },60);
    };

    function endSpin(vals){
      spinning=false;document.getElementById('sl-spin').disabled=false;
      const syms=vals.map(v=>SYMBOLS[v]);
      let win=0,msg='',color='var(--muted)';

      if(syms[0].name===syms[1].name&&syms[1].name===syms[2].name){
        // jackpot
        win=bet*syms[0].v;wins++;
        if(syms[0].name==='seven'){msg='JACKPOT!! 7 7 7';color='#ef4444';}
        else{msg=`triple ${syms[0].s}!`;color=syms[0].color;}
        document.getElementById('sl-line').style.transform='scaleX(1)';
      } else if(syms[0].name===syms[1].name||syms[1].name===syms[2].name||syms[0].name===syms[2].name){
        win=bet*3;wins++;msg='par! +'+win;color='var(--warn)';
        document.getElementById('sl-line').style.transform='scaleX(0.6)';
      } else {
        msg=['nada...','sin suerte','casi...','sigue intentando'][~~(Math.random()*4)];
      }

      credits+=win;save();updateCredits();
      document.getElementById('sl-wins').textContent=wins;
      document.getElementById('sl-msg').textContent=msg;
      if(win>0)toast(msg);

      spinHistory.unshift({syms:syms.map(s=>s.s).join(' '),win,msg});
      if(spinHistory.length>8)spinHistory.pop();
      document.getElementById('sl-hist').innerHTML=spinHistory.map(h=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:0.75rem">
          <span style="font-family:var(--mono);letter-spacing:8px">${h.syms}</span>
          <span style="color:${h.win>0?'var(--success)':'var(--muted)'};font-family:var(--mono)">${h.win>0?'+'+h.win:'—'}</span>
        </div>`).join('');

      renderReels(vals);
    }

    // add free credits button if broke
    const fcBtn=document.createElement('button');fcBtn.className='btn sm';fcBtn.textContent='+100 créditos gratis';fcBtn.style.marginTop='10px';fcBtn.onclick=()=>{credits+=100;save();updateCredits();toast('+100 créditos');};
    root.appendChild(fcBtn);

    renderReels(reelValues.map(r=>r[1]));
  }
});
registerGame({
  abbr:'CIRC',
  id:'circle',
  theme:{bg:'#0a0a0f',accent:'#a78bfa'}, name:'Círculo perfecto', icon:'⭕',
  desc:'Dibuja un círculo a mano. ¿Qué tan redondo puedes hacerlo?',
  init(root){
    root.innerHTML=`
      <div style="max-width:400px;margin:0 auto">
        <div class="card" style="padding:12px;text-align:center;margin-bottom:12px">
          <canvas id="cCanvas" width="320" height="320" style="width:100%;max-width:320px;border-radius:8px;cursor:crosshair;touch-action:none;display:block;margin:0 auto"></canvas>
        </div>
        <div id="cResult" style="text-align:center;margin-bottom:12px;min-height:80px"></div>
        <div class="row" style="justify-content:center;gap:8px">
          <button class="btn" onclick="circleReset()">limpiar</button>
          <div class="score-chip">récord: <b id="cBest">${Store.get('circle_best',0)||'—'}${Store.get('circle_best',0)?'%':''}</b></div>
        </div>
      </div>`;
    let ctx2,pts=[],drawing=false;
    const c=document.getElementById('cCanvas');
    ctx2=c.getContext('2d');
    function grid(){ctx2.strokeStyle='rgba(0,0,0,0.05)';ctx2.lineWidth=0.5;for(let i=0;i<=320;i+=32){ctx2.beginPath();ctx2.moveTo(i,0);ctx2.lineTo(i,320);ctx2.stroke();ctx2.beginPath();ctx2.moveTo(0,i);ctx2.lineTo(320,i);ctx2.stroke();}}
    function drawPts(){ctx2.clearRect(0,0,320,320);grid();if(!pts.length)return;ctx2.beginPath();ctx2.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx2.lineTo(p.x,p.y));ctx2.strokeStyle='#1c1c1a';ctx2.lineWidth=2.5;ctx2.stroke();}
    function score(){
      if(pts.length<20){document.getElementById('cResult').innerHTML='<p class="muted" style="margin-top:1rem">dibuja más despacio</p>';return;}
      const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length,cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
      const radii=pts.map(p=>Math.hypot(p.x-cx,p.y-cy)),avg=radii.reduce((a,b)=>a+b)/radii.length;
      const dev=Math.sqrt(radii.reduce((s,r)=>s+(r-avg)**2,0)/radii.length);
      const sc=Math.max(0,Math.round(100-dev/avg*200));
      ctx2.beginPath();ctx2.arc(cx,cy,avg,0,Math.PI*2);ctx2.strokeStyle='rgba(45,90,39,0.35)';ctx2.lineWidth=1.5;ctx2.setLineDash([5,4]);ctx2.stroke();ctx2.setLineDash([]);
      const em=sc>=90?'🏆':sc>=75?'😎':sc>=60?'👍':sc>=40?'😅':'💀';
      document.getElementById('cResult').innerHTML=`<div class="num-big" style="font-size:3.5rem">${sc}%</div><div class="muted" style="font-size:0.9rem">${em} de perfección</div>`;
      const b=Store.get('circle_best',0);if(sc>b){Store.set('circle_best',sc);document.getElementById('cBest').textContent=sc+'%';}
    }
    c.onpointerdown=e=>{pts=[];drawing=true;c.setPointerCapture(e.pointerId);ctx2.clearRect(0,0,320,320);grid();document.getElementById('cResult').innerHTML='';};
    c.onpointermove=e=>{if(!drawing)return;const r=c.getBoundingClientRect(),sx=320/r.width;pts.push({x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sx});drawPts();};
    c.onpointerup=()=>{if(!drawing)return;drawing=false;if(pts.length>20)score();};
    window.circleReset=()=>{pts=[];ctx2.clearRect(0,0,320,320);grid();document.getElementById('cResult').innerHTML='';};
    grid();
  }
});

registerGame({
  abbr:'SPIN',
  id:'wheel',
  theme:{bg:'#0f0a00',accent:'#f59e0b'}, name:'Ruleta de decisiones', icon:'🎡',
  desc:'Agrega opciones, gira. Que el universo decida.',
  init(root){
    let items=Store.get('wheel_items',['Opción A','Opción B','Opción C']),spinning=false,angle=0;
    const WC=['#2d5a27','#7F77DD','#D85A30','#378ADD','#BA7517','#D4537E','#1D9E75','#888780'];
    root.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;max-width:600px;margin:0 auto">

          <div class="label-sm" style="margin-bottom:8px">opciones</div>
          <div class="row" style="margin-bottom:8px;gap:6px">
            <input type="text" id="wIn" placeholder="agrega una opción..." style="flex:1" onkeydown="if(event.key==='Enter')wAdd()"/>

          </div>
          <div id="wTags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem"></div>

          <div id="wResult" class="card center" style="display:none;margin-top:1rem">
            <div style="font-size:1.6rem;font-weight:600;font-family:var(--serif)" id="wWinner"></div>
            <div class="muted" style="font-size:0.82rem;margin-top:4px">el universo ha hablado</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center">
          <canvas id="wCanvas" width="240" height="240" style="width:100%;max-width:240px;border-radius:50%;display:block"></canvas>
        </div>
      </div>`;
    function save(){Store.set('wheel_items',items);}
    function renderTags(){document.getElementById('wTags').innerHTML=items.map((it,i)=>`<div style="font-size:0.78rem;padding:3px 10px;border-radius:99px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;color:var(--text)" onclick="wRemove(${i})" title="eliminar">${it} ×</div>`).join('');}
    window.wAdd=()=>{const v=document.getElementById('wIn').value.trim();if(!v||items.includes(v))return;items.push(v);document.getElementById('wIn').value='';save();renderTags();drawWheel(angle);};
    window.wRemove=(i)=>{items.splice(i,1);save();renderTags();drawWheel(angle);};
    function drawWheel(ang){const c=document.getElementById('wCanvas');if(!c)return;const ctx=c.getContext('2d'),n=items.length,W=240,CX=120,CY=120,R=112;ctx.clearRect(0,0,W,W);if(!n){ctx.fillStyle='#ccc';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('agrega opciones',CX,CY);return;}const sl=Math.PI*2/n;for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,ang+i*sl,ang+(i+1)*sl);ctx.closePath();ctx.fillStyle=WC[i%WC.length];ctx.fill();ctx.save();ctx.translate(CX,CY);ctx.rotate(ang+(i+0.5)*sl);ctx.fillStyle='#fff';ctx.font='bold 11px DM Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';const tx=items[i];ctx.fillText(tx.length>12?tx.slice(0,11)+'…':tx,R*0.62,0);ctx.restore();}ctx.beginPath();ctx.arc(CX,CY,10,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.moveTo(W-6,CY);ctx.lineTo(W-20,CY-8);ctx.lineTo(W-20,CY+8);ctx.closePath();ctx.fillStyle='#1c1c1a';ctx.fill();}
    window.wSpin=()=>{if(spinning||items.length<2)return;spinning=true;document.getElementById('wResult').style.display='none';const tot=Math.PI*2*6+Math.random()*Math.PI*2,dur=3500,st=Date.now(),sa=angle;function anim(){const t=Math.min(1,(Date.now()-st)/dur),ease=1-Math.pow(1-t,4);angle=sa+tot*ease;drawWheel(angle);if(t<1){requestAnimationFrame(anim);}else{spinning=false;const n=items.length,sl=Math.PI*2/n,norm=((-angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2),idx=Math.floor(norm/sl)%n;document.getElementById('wWinner').textContent='🎯 '+items[idx];document.getElementById('wResult').style.display='block';}}requestAnimationFrame(anim);};
    renderTags();drawWheel(0);
  }
});

        <!-- fact display -->
        <div style="position:relative;border-radius:14px;border:1px solid rgba(245,158,11,0.2);min-height:200px;background:rgba(245,158,11,0.04);margin-bottom:14px;overflow:hidden">
          <!-- decorative top bar -->
          <div style="height:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24,#f59e0b);opacity:0.6"></div>
          <div style="padding:24px">
            <div id="fact-cat-badge" style="font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,158,11,0.5);margin-bottom:12px;font-family:var(--mono)">—</div>
            <div id="fact-text" style="font-size:1.05rem;color:#fef3c7;line-height:1.65;font-weight:400">Presiona el botón para descubrir algo interesante.</div>
            <div id="fact-num" style="font-size:0.6rem;color:rgba(245,158,11,0.25);margin-top:16px;font-family:var(--mono)">0 / ${FACTS.length} descubiertos</div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button style="flex:1;padding:12px;background:#f59e0b;color:#0a0a0a;border:none;border-radius:8px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.12s;letter-spacing:0.02em" onclick="factNext()" id="fact-btn">dato random</button>
          <button class="btn sm" onclick="factReset()" title="resetear progreso">↺</button>
        </div>

        <!-- progress bar -->
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:0.62rem;color:var(--muted);margin-bottom:5px;font-family:var(--mono)">
            <span>descubiertos</span><span id="fact-prog-txt">0 / ${FACTS.length}</span>
          </div>
          <div style="background:var(--surface3);border-radius:99px;height:4px;overflow:hidden">
            <div id="fact-prog-bar" style="height:100%;background:#f59e0b;border-radius:99px;width:0%;transition:width 0.4s"></div>
          </div>
        </div>

        <!-- history -->
        <div id="fact-hist" style="display:flex;flex-direction:column;gap:5px"></div>
      </div>`;

    let shownList=Store.get('facts_seen',[]);
    shown=new Set(shownList);
    updateProgress();

    window.factCat=cat=>{
      filterCat=cat;
      document.querySelectorAll('#fact-cats button').forEach(b=>{
        const isActive=b.textContent===cat||(cat==='todos'&&b.textContent==='todos');
        b.style.cssText=isActive?'background:#f59e0b;color:#0a0a0a;border-color:#f59e0b':'';
        b.className='btn sm';
      });
    };

    window.factNext=()=>{
      const pool=FACTS.filter(f=>(filterCat==='todos'||f.cat===filterCat)&&!shown.has(f.fact));
      const source=pool.length>0?pool:FACTS.filter(f=>filterCat==='todos'||f.cat===filterCat);
      if(!source.length)return;
      const f=source[~~(Math.random()*source.length)];
      current=f;shown.add(f.fact);
      shownList=[...shown];Store.set('facts_seen',shownList.slice(-50));

      const el=document.getElementById('fact-text');
      const badge=document.getElementById('fact-cat-badge');
      if(el){el.style.opacity='0';el.style.transform='translateY(8px)';
        setTimeout(()=>{el.textContent=f.fact;el.style.transition='all 0.22s';el.style.opacity='1';el.style.transform='translateY(0)';},110);}
      if(badge)badge.textContent=f.cat;
      updateProgress();
    };

    function updateProgress(){
      const total=FACTS.length,disc=shown.size;
      const pct=Math.round(disc/total*100);
      const bar=document.getElementById('fact-prog-bar');if(bar)bar.style.width=pct+'%';
      const txt=document.getElementById('fact-prog-txt');if(txt)txt.textContent=disc+' / '+total;
      const num=document.getElementById('fact-num');if(num)num.textContent=disc+' / '+total+' descubiertos';
    }

    window.factReset=()=>{shown=new Set();shownList=[];Store.set('facts_seen',[]);updateProgress();toast('Progreso reseteado');};
  }
});
</script>
</body>
</html>
